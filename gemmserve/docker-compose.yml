version: "3.9"

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./scripts:/scripts
      - ./kernel:/kernel
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gemmserve
      MODEL_S3_BUCKET: gemmserve-models
      MODEL_S3_KEY: weights.npz
      AWS_REGION: us-west-2

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gemmserve
    ports:
      - "5433:5432"